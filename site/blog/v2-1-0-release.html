*{margin:0;padding:0;box-sizing:border-box}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.8;overflow-x:hidden}

article blockquote{border-left:3px solid var(--accent);padding:12px 20px;margin:20px 0;background:var(--surface);border-radius:0 8px 8px 0;font-style:italic;color:var(--muted)}

.compare-table{width:100%;border-collapse:collapse;margin:24px 0;font-size:14px}
.compare-table th{text-align:left;padding:12px 16px;background:var(--surface);border:1px solid var(--border);color:var(--accent2);font-weight:600}
.compare-table td{padding:12px 16px;border:1px solid var(--border);vertical-align:top}
.compare-table tr:hover td{background:rgba(108,92,231,0.05)}

.cta-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;margin:48px 0;text-align:center}
.cta-box h3{color:var(--accent2);margin:0 0 12px}
.cta-box p{color:var(--muted);margin-bottom:20px}
.cta-box code{display:inline-block;background:var(--bg);padding:10px 20px;border-radius:6px;font-size:14px;cursor:pointer}
.cta-box .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;background:var(--accent);color:#fff;margin-top:12px;transition:all 0.2s}
.cta-box .btn:hover{background:var(--accent2);text-decoration:none;transform:translateY(-1px)}

.highlight-box{background:linear-gradient(135deg,rgba(108,92,231,0.1),rgba(0,206,201,0.1));border:1px solid var(--accent);border-radius:12px;padding:24px;margin:24px 0}
.highlight-box p{margin-bottom:0}

footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
footer a{color:var(--muted)}
footer a:hover{color:var(--accent2)}

@media(max-width:600px){

var I18N = {
  "zh-TW": {
    nav_blog: "Blog",
    title: "Tetora <span>v2.1.0</span><br>大規模程式碼整合 + Workflow Engine & Marketplace",
    meta: "2026-03-18 &middot; Release Notes",
    h2_consolidation: "程式碼整合：256 檔案 → 精簡核心",
    h2_workflow: "Workflow Engine",
    h2_marketplace: "Template Marketplace",
    h2_taskboard: "TaskBoard & Dispatch 改進",
    h2_install: "安裝 / 升級",
    h2_next: "下一步：v2.2 規劃",
    section1: '<p>Tetora v2.1.0 是一次重大更新。這個版本的核心主題有兩個：<strong>程式碼架構大整理</strong>與<strong>新功能落地</strong>。</p><p>從使用者角度看，你會得到更穩定的執行環境、更快的疊代週期，以及等待已久的 Workflow Engine 和 Template Marketplace。從開發者角度看，這是 Tetora 從快速原型走向長期可維護產品的關鍵一步。</p><div class="highlight-box"><p><strong>一句話總結：</strong>root 原始碼檔案從 28 個整合為 9 個，測試檔案從 111 個整合為 22 個，整個 repo 從 256+ 檔案一路壓縮到現在的精簡結構——同時新增了 Workflow Engine、Template Marketplace 和多項 Dashboard 改進。</p></div>',
    section2: '<p>這次整合歷經多輪重構，最終成果如下：</p><table class="compare-table"><thead><tr><th>指標</th><th>整合前</th><th>整合後</th></tr></thead><tbody><tr><td>Repo 總檔案數</td><td>256+</td><td>~73（持續進行中）</td></tr><tr><td>Root source files</td><td>28</td><td>9</td></tr><tr><td>Test files</td><td>111</td><td>22</td></tr></tbody></table><p>9 個 root 檔案按領域劃分：</p><ul><li><code>main.go</code> — 程式入口、指令路由、啟動流程</li><li><code>http.go</code> — HTTP server、API 路由、Dashboard handler</li><li><code>discord.go</code> — Discord gateway、訊息處理、終端機橋接</li><li><code>dispatch.go</code> — 任務調度、TaskBoard、並行控制</li><li><code>workflow.go</code> — Workflow Engine、DAG 執行、步驟管理</li><li><code>wire.go</code> — 跨模組配線、初始化、依賴注入</li><li><code>tool.go</code> — 工具系統、MCP 整合、能力管理</li><li><code>signal_unix.go</code> / <code>signal_windows.go</code> — 平台信號處理</li></ul><p>大量業務邏輯同步遷移到 <code>internal/</code> 子套件：<code>internal/cron</code>、<code>internal/dispatch</code>、<code>internal/workflow</code>、<code>internal/taskboard</code>、<code>internal/reflection</code> 等，讓 root 層保持薄薄的一層協調邏輯。</p><h3>為什麼這件事重要？</h3><p>過去 root 層有超過 100 個檔案，每個功能散落各處，新進貢獻者光是找到正確的檔案就要花相當多時間。整合後：</p><ul><li><strong>更容易維護</strong>——修改一個功能，你知道去哪裡找</li><li><strong>新貢獻者更快上手</strong>——9 個入口點，而不是 28 個</li><li><strong>IDE 導航更清晰</strong>——go to definition 不再在茫茫檔案海中迷路</li><li><strong>編譯更快</strong>——減少不必要的套件邊界和 import 鏈</li></ul>',
    section3: '<p>Workflow Engine 是 v2.1.0 最核心的新功能。它讓你可以用 YAML 描述多步驟的 AI 工作流，Tetora 負責執行、錯誤處理、狀態追蹤。</p><h3>DAG-based Pipeline</h3><p>工作流以有向無環圖（DAG）結構定義，支援：</p><ul><li><strong>條件分支</strong>——根據前一步驟的輸出決定走哪條路</li><li><strong>並行步驟</strong>——沒有相依關係的步驟同時執行，縮短總時間</li><li><strong>Retry 機制</strong>——步驟失敗後自動重試，可設定次數與退避策略</li></ul><pre>name: content-pipeline\nsteps:\n  - id: research\n    agent: hisui\n    prompt: "研究主題：{{input.topic}}"\n  - id: draft\n    agent: kokuyou\n    depends_on: [research]\n    prompt: "根據研究結果撰寫初稿"\n  - id: review\n    agent: ruri\n    depends_on: [draft]\n    condition: "{{draft.word_count}} > 500"</pre><h3>Dynamic Model Routing</h3><p>Workflow Engine 根據任務複雜度自動選擇模型：</p><ul><li>簡單格式化、摘要任務 → <strong>Haiku</strong>（快速、低成本）</li><li>一般推理、文案撰寫 → <strong>Sonnet</strong>（預設）</li><li>複雜分析、多步驟規劃 → <strong>Opus</strong>（最高能力）</li></ul><p>你也可以在 YAML 中明確指定，或讓路由器根據 prompt 長度和關鍵字自動判斷。</p><h3>Dashboard DAG 視覺化</h3><p>執行中的 Workflow 在 Dashboard 上以節點圖形式呈現：已完成步驟顯示綠色、執行中顯示紫色動畫、等待中顯示灰色、失敗顯示紅色。你可以即時看到整個 Pipeline 的進度，不需要看 log。</p>',
    section4: '<p>Template Marketplace 讓工作流模板可以被分享、瀏覽、一鍵匯入。這是 Tetora 從個人工具走向生態系的第一步。</p><h3>Store Tab</h3><p>Dashboard 新增 Store 分頁，提供：</p><ul><li><strong>分類瀏覽</strong>——按領域篩選（行銷、工程、財務、研究等）</li><li><strong>全文搜尋</strong>——在模板名稱和描述中搜尋</li><li><strong>精選展示</strong>——官方推薦的高品質模板</li><li><strong>一鍵匯入</strong>——點擊即匯入到本地 workspace</li></ul><h3>Capabilities Tab</h3><p>另一個新分頁 Capabilities，把你的 Tetora 實例擁有的所有能力集中展示：</p><ul><li><strong>Tools</strong>——可用的 MCP 工具清單</li><li><strong>Skills</strong>——已定義的 Skill 指令</li><li><strong>Workflows</strong>——本地 Workflow 模板</li><li><strong>Templates</strong>——Agent prompt 模板</li></ul><h3>CLI Import / Export</h3><p>不只是 UI，Store 功能也完整支援 CLI 操作：</p><pre>tetora workflow export my-pipeline   # 匯出為可分享的 YAML\ntetora workflow create from-store    # 從 Store 匯入模板\ntetora workflow list                  # 列出所有本地 Workflow</pre><p>匯出的 YAML 可以直接貼到 GitHub Gist 或 Tetora Store 上分享給社群。</p>',
    section5: '<p>TaskBoard 和 Dispatch 層有多項重要改進，提升了多 agent 並行工作的穩定性和可觀測性。</p><h3>可配置並行 Slot + Slot Pressure</h3><p>你現在可以在設定檔中指定最大並行 slot 數，以及 slot pressure 閾值。當系統負載超過閾值，新任務會自動排隊而不是強行插入，避免 agent 互相競爭資源：</p><pre>{
  "dispatch": {
    "maxSlots": 4,
    "slotPressureThreshold": 0.8
  }
}</pre><h3>Partial-Done 狀態</h3><p>長任務現在支援 <code>partial-done</code> 中間狀態。Agent 可以在完成部分工作後回報進度，TaskBoard 上會顯示完成百分比，讓你知道任務正在推進而不是卡住了。</p><h3>Worktree 資料保護</h3><p>多個 agent 使用 Git worktree 並行開發時，現在有明確的資料隔離保護。每個 agent 的工作目錄獨立，不會發生意外覆寫或 merge conflict 污染其他 agent 的狀態。</p><h3>GitLab MR 支援</h3><p>除了 GitHub PR，現在也支援 GitLab Merge Request 工作流。<code>tetora pr create</code> 指令會自動偵測遠端 remote 類型，分別呼叫 GitHub CLI 或 GitLab CLI 建立 MR。</p>',
    section6: '<h3>全新安裝</h3><pre>curl -fsSL https://tetora.dev/install.sh | bash</pre><p>單一執行檔，零外部依賴。macOS、Linux、Windows 全平台支援。</p><h3>從舊版升級</h3><pre>tetora upgrade</pre><p>升級指令會自動下載最新版本、替換執行檔、重啟 daemon。升級過程中不會中斷正在執行的任務。</p><div class="highlight-box"><p><strong>注意：</strong>升級前建議先確認沒有長時間執行的 Workflow 正在進行中。執行 <code>tetora status</code> 查看當前活躍的任務。</p></div>',
    section7: '<p>v2.1.0 落地後，開發重心將轉向 v2.2 的兩個主題模組：</p><h3>Financial Module</h3><p>針對個人和小型企業的財務自動化：收支追蹤、報表生成、預算監控。計劃整合常見的記帳 API（freee、Money Forward 等）。</p><h3>Nutrition Module</h3><p>健康與飲食追蹤：餐點記錄、營養分析、目標設定。Claude 作為營養顧問，根據你的飲食習慣提供建議。</p><p>這兩個模組都會以 Workflow 模板的形式發布到 Store，讓你可以直接匯入使用，不需要從頭配置。</p><div class="cta-box"><h3 data-i18n="cta_title">立即升級到 v2.1.0</h3><p data-i18n="cta_desc">單一執行檔，零依賴。macOS / Linux / Windows 全平台支援。</p><pre>tetora upgrade</pre><a href="https://github.com/TakumaLee/Tetora/releases" class="btn">查看 Release Notes &rarr;</a></div>',
    section_cta: '',
    cta_title: "立即升級到 v2.1.0",
    cta_desc: "單一執行檔，零依賴。macOS / Linux / Windows 全平台支援。"
  },
  ja: {
    nav_blog: "ブログ",
    title: "Tetora <span>v2.1.0</span><br>大規模コード統合 + Workflow Engine & Marketplace",
    meta: "2026-03-18 &middot; リリースノート",
    h2_consolidation: "コード統合：256 ファイル → スリムなコア",
    h2_workflow: "Workflow Engine",
    h2_marketplace: "Template Marketplace",
    h2_taskboard: "TaskBoard & Dispatch の改善",
    h2_install: "インストール / アップグレード",
    h2_next: "次のステップ：v2.2 計画",
    section1: '<p>Tetora v2.1.0 は大型アップデートです。このバージョンの核心テーマは 2 つ：<strong>コードアーキテクチャの大整理</strong>と<strong>新機能の実装</strong>です。</p><p>ユーザー視点では、より安定した実行環境、高速な反復サイクル、そして待望の Workflow Engine と Template Marketplace を提供します。開発者視点では、Tetora が急速なプロトタイプから長期的に保守可能なプロダクトへの重要な一歩です。</p><div class="highlight-box"><p><strong>一言で言えば：</strong>root ソースファイルを 28 個から 9 個に統合し、テストファイルを 111 個から 22 個に統合。リポジトリ全体を 256+ ファイルからスリムな構造へ圧縮——同時に Workflow Engine、Template Marketplace、各種 Dashboard 改善を追加しました。</p></div>',
    section2: '<p>今回の統合は複数ラウンドのリファクタリングを経て、次の成果を達成しました：</p><table class="compare-table"><thead><tr><th>指標</th><th>統合前</th><th>統合後</th></tr></thead><tbody><tr><td>リポジトリ総ファイル数</td><td>256+</td><td>~73（進行中）</td></tr><tr><td>Root ソースファイル数</td><td>28</td><td>9</td></tr><tr><td>テストファイル数</td><td>111</td><td>22</td></tr></tbody></table><p>9 つの root ファイルはドメインごとに分割されています：</p><ul><li><code>main.go</code> — エントリーポイント、コマンドルーティング、起動処理</li><li><code>http.go</code> — HTTP サーバー、API ルーティング、Dashboard ハンドラー</li><li><code>discord.go</code> — Discord ゲートウェイ、メッセージ処理、ターミナルブリッジ</li><li><code>dispatch.go</code> — タスクディスパッチ、TaskBoard、並列制御</li><li><code>workflow.go</code> — Workflow Engine、DAG 実行、ステップ管理</li><li><code>wire.go</code> — クロスモジュール配線、初期化、依存性注入</li><li><code>tool.go</code> — ツールシステム、MCP 統合、ケイパビリティ管理</li><li><code>signal_unix.go</code> / <code>signal_windows.go</code> — プラットフォーム固有のシグナル処理</li></ul><p>大量のビジネスロジックが <code>internal/</code> サブパッケージ（<code>internal/cron</code>、<code>internal/dispatch</code>、<code>internal/workflow</code>、<code>internal/taskboard</code>、<code>internal/reflection</code> など）に移行し、root 層は薄い調整ロジックのみを保持します。</p><h3>なぜこれが重要か？</h3><p>以前は root 層に 100 以上のファイルがあり、機能が散在していたため、新規コントリビューターが正しいファイルを見つけるだけで多くの時間を要していました。統合後は：</p><ul><li><strong>保守が容易に</strong>——機能の変更先が明確</li><li><strong>新規コントリビューターの立ち上げが速く</strong>——28 ではなく 9 つのエントリーポイント</li><li><strong>IDE ナビゲーションが明確に</strong>——go to definition でファイルを迷わない</li><li><strong>ビルドが高速化</strong>——不要なパッケージ境界と import チェーンを削減</li></ul>',
    section3: '<p>Workflow Engine は v2.1.0 の中核となる新機能です。YAML でマルチステップの AI ワークフローを記述し、Tetora が実行・エラー処理・状態追跡を担います。</p><h3>DAG ベースのパイプライン</h3><p>ワークフローは有向非巡回グラフ（DAG）構造で定義され、以下をサポート：</p><ul><li><strong>条件分岐</strong>——前のステップの出力に基づいてルートを決定</li><li><strong>並列ステップ</strong>——依存関係のないステップを同時実行して総時間を短縮</li><li><strong>リトライ機構</strong>——ステップ失敗時の自動リトライ、回数とバックオフ戦略を設定可能</li></ul><pre>name: content-pipeline\nsteps:\n  - id: research\n    agent: hisui\n    prompt: "テーマを調査：{{input.topic}}"\n  - id: draft\n    agent: kokuyou\n    depends_on: [research]\n    prompt: "調査結果をもとに初稿を作成"\n  - id: review\n    agent: ruri\n    depends_on: [draft]\n    condition: "{{draft.word_count}} > 500"</pre><h3>ダイナミックモデルルーティング</h3><p>Workflow Engine はタスクの複雑さに応じてモデルを自動選択：</p><ul><li>簡単なフォーマット・要約 → <strong>Haiku</strong>（高速・低コスト）</li><li>一般的な推論・文章作成 → <strong>Sonnet</strong>（デフォルト）</li><li>複雑な分析・マルチステップ計画 → <strong>Opus</strong>（最高性能）</li></ul><p>YAML で明示的に指定するか、プロンプトの長さとキーワードに基づいてルーターが自動判断します。</p><h3>Dashboard DAG 可視化</h3><p>実行中のワークフローは Dashboard にノードグラフとして表示：完了ステップは緑、実行中は紫のアニメーション、待機中はグレー、失敗は赤。ログを確認しなくてもパイプライン全体の進捗をリアルタイムで把握できます。</p>',
    section4: '<p>Template Marketplace でワークフローテンプレートを共有・閲覧・ワンクリックインポートできるようになりました。Tetora が個人ツールからエコシステムへ向かう第一歩です。</p><h3>Store タブ</h3><p>Dashboard に Store タブを新設し、以下を提供：</p><ul><li><strong>カテゴリブラウズ</strong>——ドメインでフィルタリング（マーケティング、エンジニアリング、財務、リサーチ等）</li><li><strong>全文検索</strong>——テンプレート名と説明を検索</li><li><strong>おすすめ表示</strong>——公式推奨の高品質テンプレート</li><li><strong>ワンクリックインポート</strong>——クリックでローカル workspace にインポート</li></ul><h3>Capabilities タブ</h3><p>新たな Capabilities タブで、Tetora インスタンスが持つすべてのケイパビリティを一覧表示：</p><ul><li><strong>Tools</strong>——利用可能な MCP ツール一覧</li><li><strong>Skills</strong>——定義済みの Skill コマンド</li><li><strong>Workflows</strong>——ローカルの Workflow テンプレート</li><li><strong>Templates</strong>——Agent プロンプトテンプレート</li></ul><h3>CLI インポート / エクスポート</h3><p>UI だけでなく、CLI でも完全にサポート：</p><pre>tetora workflow export my-pipeline   # 共有可能な YAML としてエクスポート\ntetora workflow create from-store    # Store からテンプレートをインポート\ntetora workflow list                  # ローカルの Workflow を一覧表示</pre><p>エクスポートした YAML は GitHub Gist や Tetora Store に貼り付けてコミュニティで共有できます。</p>',
    section5: '<p>TaskBoard と Dispatch 層に複数の重要な改善を加え、マルチエージェント並列作業の安定性と可観測性を向上させました。</p><h3>設定可能な並列スロット + スロットプレッシャー</h3><p>設定ファイルで最大並列スロット数とスロットプレッシャー閾値を指定できるようになりました。システム負荷が閾値を超えると、新しいタスクは強制挿入ではなく自動でキューに入り、エージェント間のリソース競合を防ぎます：</p><pre>{
  "dispatch": {
    "maxSlots": 4,
    "slotPressureThreshold": 0.8
  }
}</pre><h3>Partial-Done ステータス</h3><p>長時間タスクで <code>partial-done</code> の中間ステータスをサポート。エージェントが一部の作業を完了した後に進捗を報告でき、TaskBoard に完了率が表示されます。タスクが停止しているのか進行中なのかが一目でわかります。</p><h3>Worktree データ保護</h3><p>複数のエージェントが Git worktree を使って並列開発する際、明確なデータ分離保護が加わりました。各エージェントの作業ディレクトリは独立しており、意図しない上書きや他エージェントの状態を汚染するマージコンフリクトが発生しません。</p><h3>GitLab MR サポート</h3><p>GitHub PR に加えて、GitLab Merge Request ワークフローをサポート。<code>tetora pr create</code> コマンドがリモートの種類を自動検出し、GitHub CLI または GitLab CLI を適切に呼び出して MR を作成します。</p>',
    section6: '<h3>新規インストール</h3><pre>curl -fsSL https://tetora.dev/install.sh | bash</pre><p>シングルバイナリ、外部依存ゼロ。macOS、Linux、Windows に対応。</p><h3>旧バージョンからのアップグレード</h3><pre>tetora upgrade</pre><p>最新バージョンを自動ダウンロードし、バイナリを置き換え、デーモンを再起動します。アップグレード中も実行中のタスクは中断されません。</p><div class="highlight-box"><p><strong>注意：</strong>アップグレード前に長時間実行中のワークフローがないことを確認することをお勧めします。<code>tetora status</code> でアクティブなタスクを確認してください。</p></div>',
    section7: '<p>v2.1.0 のリリース後、開発の重点は v2.2 の 2 つのテーマモジュールに移ります：</p><h3>Financial Module</h3><p>個人および中小企業向けの財務自動化：収支追跡、レポート生成、予算モニタリング。一般的な会計 API（freee、Money Forward 等）との統合を予定。</p><h3>Nutrition Module</h3><p>健康・食事追跡：食事記録、栄養分析、目標設定。Claude が栄養アドバイザーとして、あなたの食習慣に基づいたアドバイスを提供します。</p><p>両モジュールとも Workflow テンプレートとして Store に公開予定で、ゼロから設定することなく直接インポートして使用できます。</p><div class="cta-box"><h3 data-i18n="cta_title">v2.1.0 へアップグレード</h3><p data-i18n="cta_desc">シングルバイナリ、依存関係ゼロ。macOS / Linux / Windows 対応。</p><pre>tetora upgrade</pre><a href="https://github.com/TakumaLee/Tetora/releases" class="btn">リリースノートを見る &rarr;</a></div>',

  en: {
    nav_blog: "Blog",
    title: "Tetora <span>v2.1.0</span><br>Massive Codebase Consolidation + Workflow Engine & Marketplace",
    meta: "2026-03-18 &middot; Release Notes",
    h2_consolidation: "Codebase Consolidation: 256 Files → Lean Core",
    h2_workflow: "Workflow Engine",

    h2_taskboard: "TaskBoard & Dispatch Improvements",
    h2_install: "Install / Upgrade",
    h2_next: "What\'s Next: v2.2 Roadmap",
    section1: '<p>Tetora v2.1.0 is a significant release. Two themes define this version: <strong>a major codebase restructure</strong> and <strong>new features shipping</strong>.</p><p>For users: a more stable runtime, faster iteration cycles, and the long-awaited Workflow Engine and Template Marketplace. For developers: this is Tetora\'s transition from rapid prototype to long-term maintainable product.</p><div class="highlight-box"><p><strong>TL;DR:</strong> Root source files consolidated from 28 to 9, test files from 111 to 22, the entire repo compressed from 256+ files to a lean structure — while adding the Workflow Engine, Template Marketplace, and multiple Dashboard improvements.</p></div>',
    section2: '<p>The consolidation happened across multiple refactoring rounds. Here are the final numbers:</p><table class="compare-table"><thead><tr><th>Metric</th><th>Before</th><th>After</th></tr></thead><tbody><tr><td>Total repo files</td><td>256+</td><td>~73 (ongoing)</td></tr><tr><td>Root source files</td><td>28</td><td>9</td></tr><tr><td>Test files</td><td>111</td><td>22</td></tr></tbody></table><p>The 9 root files are split by domain:</p><ul><li><code>main.go</code> — Entry point, command routing, startup sequence</li><li><code>http.go</code> — HTTP server, API routing, Dashboard handlers</li><li><code>discord.go</code> — Discord gateway, message handling, terminal bridge</li><li><code>dispatch.go</code> — Task dispatch, TaskBoard, concurrency control</li><li><code>workflow.go</code> — Workflow Engine, DAG execution, step management</li><li><code>wire.go</code> — Cross-module wiring, initialization, dependency injection</li><li><code>tool.go</code> — Tool system, MCP integration, capabilities management</li><li><code>signal_unix.go</code> / <code>signal_windows.go</code> — Platform-specific signal handling</li></ul><p>Substantial business logic has been migrated to <code>internal/</code> sub-packages: <code>internal/cron</code>, <code>internal/dispatch</code>, <code>internal/workflow</code>, <code>internal/taskboard</code>, <code>internal/reflection</code>, and more. The root layer now holds only a thin coordination layer.</p><h3>Why Does This Matter?</h3><p>Previously, the root layer had 100+ files with functionality scattered everywhere — new contributors had to spend significant time just finding the right file. After consolidation:</p><ul><li><strong>Easier to maintain</strong> — you know exactly where to look when changing a feature</li><li><strong>Faster onboarding</strong> — 9 entry points instead of 28</li><li><strong>Clearer IDE navigation</strong> — go to definition no longer gets lost in a sea of files</li><li><strong>Faster builds</strong> — fewer unnecessary package boundaries and import chains</li></ul>',
    section3: '<p>The Workflow Engine is the flagship new feature of v2.1.0. Define multi-step AI workflows in YAML; Tetora handles execution, error recovery, and state tracking.</p><h3>DAG-Based Pipeline</h3><p>Workflows are defined as directed acyclic graphs (DAGs), supporting:</p><ul><li><strong>Conditional branching</strong> — route execution based on the output of prior steps</li><li><strong>Parallel steps</strong> — steps with no dependencies run concurrently, reducing total wall time</li><li><strong>Retry mechanism</strong> — automatic retries on step failure, configurable count and backoff strategy</li></ul><pre>name: content-pipeline\nsteps:\n  - id: research\n    agent: hisui\n    prompt: "Research the topic: {{input.topic}}"\n  - id: draft\n    agent: kokuyou\n    depends_on: [research]\n    prompt: "Write a draft based on the research"\n  - id: review\n    agent: ruri\n    depends_on: [draft]\n    condition: "{{draft.word_count}} > 500"</pre><h3>Dynamic Model Routing</h3><p>The Workflow Engine automatically selects the model based on task complexity:</p><ul><li>Simple formatting, summarization → <strong>Haiku</strong> (fast, low cost)</li><li>General reasoning, writing → <strong>Sonnet</strong> (default)</li><li>Complex analysis, multi-step planning → <strong>Opus</strong> (maximum capability)</li></ul><p>You can also specify the model explicitly in YAML, or let the router decide based on prompt length and keywords.</p><h3>Dashboard DAG Visualization</h3><p>Running workflows are rendered as a node graph in the Dashboard: completed steps in green, running steps with a purple animation, waiting steps in gray, failed steps in red. Real-time pipeline progress at a glance — no need to tail logs.</p>',
    section4: '<p>The Template Marketplace enables sharing, browsing, and one-click importing of workflow templates. It\'s Tetora\'s first step from a personal tool to a community ecosystem.</p><h3>Store Tab</h3><p>A new Store tab in the Dashboard provides:</p><ul><li><strong>Category browsing</strong> — filter by domain (Marketing, Engineering, Finance, Research, etc.)</li><li><strong>Full-text search</strong> — search across template names and descriptions</li><li><strong>Featured section</strong> — officially curated, high-quality templates</li><li><strong>One-click import</strong> — click to import directly into your local workspace</li></ul><h3>Capabilities Tab</h3><p>A new Capabilities tab gives a consolidated view of everything your Tetora instance can do:</p><ul><li><strong>Tools</strong> — available MCP tool list</li><li><strong>Skills</strong> — defined Skill commands</li><li><strong>Workflows</strong> — local Workflow templates</li><li><strong>Templates</strong> — Agent prompt templates</li></ul><h3>CLI Import / Export</h3><p>Not just UI — full CLI support too:</p><pre>tetora workflow export my-pipeline   # Export as shareable YAML\ntetora workflow create from-store    # Import a template from the Store\ntetora workflow list                  # List all local workflows</pre><p>Exported YAML can be pasted directly into a GitHub Gist or the Tetora Store to share with the community.</p>',
    section5: '<p>Multiple important improvements to the TaskBoard and Dispatch layer improve stability and observability for multi-agent parallel workloads.</p><h3>Configurable Parallel Slots + Slot Pressure</h3><p>You can now specify the maximum number of parallel slots and a slot pressure threshold in the config. When system load exceeds the threshold, new tasks are queued rather than force-inserted, preventing agents from competing for resources:</p><pre>{
  "dispatch": {
    "maxSlots": 4,
    "slotPressureThreshold": 0.8
  }
}</pre><h3>Partial-Done Status</h3><p>Long-running tasks now support a <code>partial-done</code> intermediate state. Agents can report progress after completing portions of work; the TaskBoard displays a completion percentage so you know the task is advancing rather than stalled.</p><h3>Worktree Data Protection</h3><p>When multiple agents use Git worktrees for parallel development, explicit data isolation is now enforced. Each agent\'s working directory is independent — no accidental overwrites or merge conflicts polluting another agent\'s state.</p><h3>GitLab MR Support</h3><p>In addition to GitHub PRs, GitLab Merge Request workflows are now supported. The <code>tetora pr create</code> command auto-detects the remote type and calls either the GitHub CLI or GitLab CLI accordingly to open the MR.</p>',
    section6: '<h3>Fresh Install</h3><pre>curl -fsSL https://tetora.dev/install.sh | bash</pre><p>Single binary, zero external dependencies. macOS, Linux, and Windows all supported.</p><h3>Upgrading from a Prior Version</h3><pre>tetora upgrade</pre><p>Automatically downloads the latest release, replaces the binary, and restarts the daemon. Tasks running at upgrade time are not interrupted.</p><div class="highlight-box"><p><strong>Tip:</strong> Before upgrading, confirm there are no long-running workflows in progress. Run <code>tetora status</code> to check active tasks.</p></div>',
    section7: '<p>With v2.1.0 shipped, development focus shifts to two theme modules for v2.2:</p><h3>Financial Module</h3><p>Personal and small business finance automation: income/expense tracking, report generation, budget monitoring. Integration with common accounting APIs (freee, Money Forward, etc.) is planned.</p><h3>Nutrition Module</h3><p>Health and diet tracking: meal logging, nutritional analysis, goal setting. Claude acts as a nutrition advisor, offering personalized recommendations based on your eating habits.</p><p>Both modules will be published to the Store as Workflow templates — import and use immediately, no configuration from scratch required.</p><div class="cta-box"><h3 data-i18n="cta_title">Upgrade to v2.1.0 Now</h3><p data-i18n="cta_desc">Single binary, zero dependencies. macOS / Linux / Windows.</p><pre>tetora upgrade</pre><a href="https://github.com/TakumaLee/Tetora/releases" class="btn">View Release Notes &rarr;</a></div>',

    h2_next: "다음 단계: v2.2 로드맵",
    section1: '<p>Tetora v2.1.0은 대규모 업데이트입니다. 이번 버전의 핵심 테마는 두 가지: <strong>코드 아키텍처 대정리</strong>와 <strong>신기능 출시</strong>입니다.</p><p>사용자 관점에서는 더 안정적인 실행 환경, 빠른 반복 주기, 그리고 오랫동안 기다려온 Workflow Engine과 Template Marketplace를 제공합니다. 개발자 관점에서는 Tetora가 빠른 프로토타입에서 장기적으로 유지 가능한 제품으로 나아가는 중요한 전환점입니다.</p><div class="highlight-box"><p><strong>한 줄 요약:</strong> root 소스 파일을 28개에서 9개로, 테스트 파일을 111개에서 22개로 통합. 전체 리포지토리를 256+개 파일에서 슬림한 구조로 압축——동시에 Workflow Engine, Template Marketplace, 다양한 Dashboard 개선 사항을 추가했습니다.</p></div>',
    section2: '<p>이번 통합은 여러 라운드의 리팩토링을 거쳐 다음과 같은 성과를 달성했습니다:</p><table class="compare-table"><thead><tr><th>지표</th><th>통합 전</th><th>통합 후</th></tr></thead><tbody><tr><td>리포지토리 총 파일 수</td><td>256+</td><td>~73 (진행 중)</td></tr><tr><td>Root 소스 파일 수</td><td>28</td><td>9</td></tr><tr><td>테스트 파일 수</td><td>111</td><td>22</td></tr></tbody></table><p>9개의 root 파일은 도메인별로 분리됩니다:</p><ul><li><code>main.go</code> — 진입점, 명령 라우팅, 시작 프로세스</li><li><code>http.go</code> — HTTP 서버, API 라우팅, Dashboard 핸들러</li><li><code>discord.go</code> — Discord 게이트웨이, 메시지 처리, 터미널 브리지</li><li><code>dispatch.go</code> — 태스크 디스패치, TaskBoard, 동시성 제어</li><li><code>workflow.go</code> — Workflow Engine, DAG 실행, 단계 관리</li><li><code>wire.go</code> — 크로스 모듈 배선, 초기화, 의존성 주입</li><li><code>tool.go</code> — 도구 시스템, MCP 통합, 기능 관리</li><li><code>signal_unix.go</code> / <code>signal_windows.go</code> — 플랫폼별 시그널 처리</li></ul><p>많은 비즈니스 로직이 <code>internal/</code> 서브 패키지(<code>internal/cron</code>, <code>internal/dispatch</code>, <code>internal/workflow</code>, <code>internal/taskboard</code>, <code>internal/reflection</code> 등)로 이전되어, root 레이어는 얇은 조정 로직만 유지합니다.</p><h3>왜 중요한가요?</h3><p>이전에는 root 레이어에 100개 이상의 파일이 있어 기능이 분산되어 있었고, 새 기여자가 올바른 파일을 찾는 데만 상당한 시간이 필요했습니다. 통합 후:</p><ul><li><strong>유지 보수 용이</strong> — 기능을 변경할 때 어디를 봐야 할지 명확</li><li><strong>빠른 온보딩</strong> — 28개가 아닌 9개의 진입점</li><li><strong>명확한 IDE 내비게이션</strong> — go to definition이 파일 더미에서 길을 잃지 않음</li><li><strong>빌드 속도 향상</strong> — 불필요한 패키지 경계와 import 체인 감소</li></ul>',
    section3: '<p>Workflow Engine은 v2.1.0의 핵심 신기능입니다. YAML로 멀티스텝 AI 워크플로를 정의하면, Tetora가 실행, 오류 처리, 상태 추적을 담당합니다.</p><h3>DAG 기반 파이프라인</h3><p>워크플로는 방향성 비순환 그래프(DAG) 구조로 정의되며, 다음을 지원합니다:</p><ul><li><strong>조건 분기</strong> — 이전 단계의 출력을 기반으로 실행 경로 결정</li><li><strong>병렬 단계</strong> — 의존성이 없는 단계를 동시에 실행하여 총 실행 시간 단축</li><li><strong>재시도 메커니즘</strong> — 단계 실패 시 자동 재시도, 횟수와 백오프 전략 설정 가능</li></ul><pre>name: content-pipeline\nsteps:\n  - id: research\n    agent: hisui\n    prompt: "주제 조사: {{input.topic}}"\n  - id: draft\n    agent: kokuyou\n    depends_on: [research]\n    prompt: "조사 결과를 바탕으로 초안 작성"\n  - id: review\n    agent: ruri\n    depends_on: [draft]\n    condition: "{{draft.word_count}} > 500"</pre><h3>다이나믹 모델 라우팅</h3><p>Workflow Engine은 태스크 복잡도에 따라 자동으로 모델을 선택합니다:</p><ul><li>간단한 포맷팅, 요약 → <strong>Haiku</strong> (빠름, 저비용)</li><li>일반 추론, 문장 작성 → <strong>Sonnet</strong> (기본값)</li><li>복잡한 분석, 멀티스텝 계획 → <strong>Opus</strong> (최고 성능)</li></ul><p>YAML에서 명시적으로 지정하거나, 프롬프트 길이와 키워드를 기반으로 라우터가 자동 판단하게 할 수 있습니다.</p><h3>Dashboard DAG 시각화</h3><p>실행 중인 워크플로는 Dashboard에 노드 그래프로 표시됩니다: 완료 단계는 녹색, 실행 중은 보라색 애니메이션, 대기 중은 회색, 실패는 빨간색. 로그를 확인하지 않아도 파이프라인 전체 진행 상황을 실시간으로 파악할 수 있습니다.</p>',
    section4: '<p>Template Marketplace로 워크플로 템플릿을 공유, 탐색, 원클릭 임포트할 수 있게 되었습니다. Tetora가 개인 도구에서 커뮤니티 생태계로 나아가는 첫 걸음입니다.</p><h3>Store 탭</h3><p>Dashboard에 새로운 Store 탭이 추가되어 다음을 제공합니다:</p><ul><li><strong>카테고리 탐색</strong> — 도메인별 필터링 (마케팅, 엔지니어링, 재무, 리서치 등)</li><li><strong>전체 텍스트 검색</strong> — 템플릿 이름과 설명에서 검색</li><li><strong>추천 섹션</strong> — 공식 추천 고품질 템플릿</li><li><strong>원클릭 임포트</strong> — 클릭으로 로컬 workspace에 바로 임포트</li></ul><h3>Capabilities 탭</h3><p>새로운 Capabilities 탭에서 Tetora 인스턴스가 가진 모든 기능을 한눈에 볼 수 있습니다:</p><ul><li><strong>Tools</strong> — 사용 가능한 MCP 도구 목록</li><li><strong>Skills</strong> — 정의된 Skill 명령어</li><li><strong>Workflows</strong> — 로컬 Workflow 템플릿</li><li><strong>Templates</strong> — Agent 프롬프트 템플릿</li></ul><h3>CLI 임포트 / 익스포트</h3><p>UI뿐만 아니라 CLI도 완전히 지원합니다:</p><pre>tetora workflow export my-pipeline   # 공유 가능한 YAML로 익스포트\ntetora workflow create from-store    # Store에서 템플릿 임포트\ntetora workflow list                  # 로컬 Workflow 목록 표시</pre><p>익스포트한 YAML은 GitHub Gist나 Tetora Store에 바로 붙여넣어 커뮤니티와 공유할 수 있습니다.</p>',
    section5: '<p>TaskBoard와 Dispatch 레이어의 여러 중요한 개선으로 멀티 에이전트 병렬 작업의 안정성과 가시성이 향상되었습니다.</p><h3>설정 가능한 병렬 슬롯 + 슬롯 프레셔</h3><p>이제 설정 파일에서 최대 병렬 슬롯 수와 슬롯 프레셔 임계값을 지정할 수 있습니다. 시스템 부하가 임계값을 초과하면 새 태스크는 강제 삽입 대신 자동으로 큐에 들어가 에이전트 간 리소스 경쟁을 방지합니다:</p><pre>{
  "dispatch": {
    "maxSlots": 4,
    "slotPressureThreshold": 0.8
  }
}</pre><h3>Partial-Done 상태</h3><p>장시간 실행 태스크에서 <code>partial-done</code> 중간 상태를 지원합니다. 에이전트가 일부 작업 완료 후 진행 상황을 보고할 수 있으며, TaskBoard에 완료율이 표시되어 태스크가 정지했는지 진행 중인지 알 수 있습니다.</p><h3>Worktree 데이터 보호</h3><p>여러 에이전트가 Git worktree를 사용하여 병렬 개발할 때, 명확한 데이터 격리 보호가 추가되었습니다. 각 에이전트의 작업 디렉토리는 독립적으로 유지되어, 의도치 않은 덮어쓰기나 다른 에이전트 상태를 오염시키는 머지 컨플릭트가 발생하지 않습니다.</p><h3>GitLab MR 지원</h3><p>GitHub PR 외에도 GitLab Merge Request 워크플로를 지원합니다. <code>tetora pr create</code> 명령이 리모트 유형을 자동 감지하여 GitHub CLI 또는 GitLab CLI를 적절히 호출해 MR을 생성합니다.</p>',
    section6: '<h3>신규 설치</h3><pre>curl -fsSL https://tetora.dev/install.sh | bash</pre><p>단일 바이너리, 외부 의존성 없음. macOS, Linux, Windows 모두 지원.</p><h3>이전 버전에서 업그레이드</h3><pre>tetora upgrade</pre><p>최신 버전을 자동으로 다운로드하고, 바이너리를 교체하고, 데몬을 재시작합니다. 업그레이드 중 실행 중인 태스크는 중단되지 않습니다.</p><div class="highlight-box"><p><strong>팁:</strong> 업그레이드 전에 장시간 실행 중인 워크플로가 없는지 확인하는 것을 권장합니다. <code>tetora status</code>로 활성 태스크를 확인하세요.</p></div>',
    section7: '<p>v2.1.0 출시 후, 개발 중점은 v2.2의 두 가지 테마 모듈로 이동합니다:</p><h3>Financial Module</h3><p>개인 및 소기업을 위한 재무 자동화: 수입/지출 추적, 보고서 생성, 예산 모니터링. 일반적인 회계 API(freee, Money Forward 등)와의 통합 예정.</p><h3>Nutrition Module</h3><p>건강 및 식이 추적: 식사 기록, 영양 분석, 목표 설정. Claude가 영양 어드바이저로서 식습관을 기반으로 맞춤형 조언을 제공합니다.</p><p>두 모듈 모두 Store에 Workflow 템플릿으로 공개될 예정으로, 처음부터 설정하지 않아도 바로 임포트하여 사용할 수 있습니다.</p><div class="cta-box"><h3 data-i18n="cta_title">지금 v2.1.0으로 업그레이드</h3><p data-i18n="cta_desc">단일 바이너리, 의존성 없음. macOS / Linux / Windows.</p><pre>tetora upgrade</pre><a href="https://github.com/TakumaLee/Tetora/releases" class="btn">릴리즈 노트 보기 &rarr;</a></div>',
    section_cta: '',
    cta_title: "지금 v2.1.0으로 업그레이드",
    cta_desc: "단일 바이너리, 의존성 없음. macOS / Linux / Windows."
  }
};

var LANGS = [
  {code:'zh-TW',label:'繁體中文'},
  {code:'ja',label:'日本語'},
  {code:'en',label:'English'},
  {code:'ko',label:'한국어'}
];

function detectLang(){
  var saved = localStorage.getItem('tetora-lang');
  if(saved && I18N[saved]) return saved;
  var nav = (navigator.language||'').toLowerCase();
  if(nav.startsWith('zh')) return 'zh-TW';
  if(nav.startsWith('ja')) return 'ja';
  if(nav.startsWith('ko')) return 'ko';
  return 'en';
}

function setLang(code){
  var strings = I18N[code] || I18N['zh-TW'];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = strings[el.dataset.i18n] || '';
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){
    el.innerHTML = strings[el.dataset.i18nHtml] || '';
  });
  // Re-apply i18n inside dynamically inserted HTML (CTA box)
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    if(strings[el.dataset.i18n]) el.textContent = strings[el.dataset.i18n];
  });
  document.documentElement.lang = code;
  localStorage.setItem('tetora-lang', code);
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.lang === code);
  });
}

var bar = document.getElementById('lang-bar');
LANGS.forEach(function(l){
  var btn = document.createElement('button');
  btn.className = 'lang-btn';
  btn.dataset.lang = l.code;
  btn.textContent = l.label;
  btn.onclick = function(){ setLang(l.code); };
  bar.appendChild(btn);
});

setLang(detectLang());
</script>
